<header class="header">
    <h1>Catálogo</h1>
</header>

@if (isLoading) {
    <div class="loading">
        <p>Cargando productos...</p>
    </div>
} @else {
    <section class="grid">
        @for(p of products; track p.id) {
            <app-producto-card [product]="p"></app-producto-card>
        }
    </section>
}
